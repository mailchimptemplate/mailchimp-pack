<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AppSumo Licenses</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="assets/js/firebase-config.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 40px; }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .header h1 { margin: 0; color: #38bdf8; font-size: 28px; }
        
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        
        .tab-content { display: none; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .tab-content.active { display: block; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 8px; color: #94a3b8; }
        .input-group input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; color: #fff; border-radius: 6px; font-family: monospace; font-size: 16px; box-sizing: border-box; outline: none; }
        .input-group input:focus { border-color: #38bdf8; }

        .btn-generate { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-generate:disabled { background: #475569; cursor: not-allowed; color: #94a3b8; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #0f172a; padding: 20px; border-radius: 10px; border: 1px solid #334155; text-align: center; }
        .stat-card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; }
        .stat-card p { margin: 0; font-size: 32px; font-weight: 700; color: #fff; }
        .stat-card .highlight { color: #10b981; } 

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { color: #38bdf8; font-weight: 600; text-transform: uppercase; }
        td { color: #cbd5e1; font-family: monospace; }
        
        /* 🔥 NEW: Revoke Button CSS */
        .btn-revoke { background: #ef4444; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Poppins', sans-serif; transition: 0.3s; display: inline-flex; align-items: center; gap: 5px; font-size: 12px;}
        .btn-revoke:hover { background: #dc2626; box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4); }

        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <i class="fas fa-shield-alt fa-3x" style="color:#38bdf8; margin-bottom:15px;"></i>
        <h2>Verifying Admin Access...</h2>
    </div>

    <div class="admin-container" id="admin-main" style="display: none;">
        <div class="header">
            <h1><i class="fas fa-user-shield"></i> Admin Workspace</h1>
            <span id="admin-email" style="color: #94a3b8; font-size: 14px;"></span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('stats')"><i class="fas fa-chart-pie"></i> License Stats</button>
            <button class="tab-btn" onclick="switchTab('generator')"><i class="fas fa-ticket-alt"></i> Code Generator</button>
        </div>

        <!-- TAB 1: LICENSE STATS -->
        <div id="tab-stats" class="tab-content active">
            <h2 style="margin-top: 0;"><i class="fas fa-satellite-dish"></i> Live License Tracking</h2>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Generated</h3>
                    <p id="stat-total">0</p>
                </div>
                <div class="stat-card">
                    <h3>Available (Unused)</h3>
                    <p id="stat-avail">0</p>
                </div>
                <div class="stat-card">
                    <h3>Active (Redeemed)</h3>
                    <p id="stat-used" class="highlight">0</p>
                </div>
            </div>

            <h3 style="margin-bottom: 10px; color: #e2e8f0; border-top: 1px solid #334155; padding-top: 20px;">Recently Redeemed Codes</h3>
            <table>
                <thead>
                    <tr>
                        <th>Promo Code</th>
                        <th>User Email</th>
                        <th>Redeemed Date</th>
                        <!-- 🔥 NEW: Action Column -->
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="used-codes-list">
                    <tr><td colspan="4" style="text-align: center;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- TAB 2: CODE GENERATOR -->
        <div id="tab-generator" class="tab-content">
            <h2 style="margin-top: 0;"><i class="fas fa-cogs"></i> Generate AppSumo Codes</h2>
            <div class="input-group">
                <label>Code Prefix (e.g. SUMO, FLIPPRO)</label>
                <input type="text" id="prefix" value="FLIPPRO" maxlength="10">
            </div>
            <div class="input-group">
                <label>How many codes to generate?</label>
                <input type="number" id="amount" value="10" min="1" max="10000">
            </div>
            <button class="btn-generate" id="gen-btn" onclick="generateCodes()"><i class="fas fa-cogs"></i> Generate & Save to Firebase</button>
            <div id="gen-status" style="margin-top: 15px; color: #10b981; font-size: 14px; display: none;"></div>
        </div>
    </div>

    <script>
        try {
            if (typeof FIREBASE_CONFIG !== 'undefined') firebase.initializeApp(FIREBASE_CONFIG);
            else if (typeof window.FIREBASE_CONFIG !== 'undefined') firebase.initializeApp(window.FIREBASE_CONFIG);
        } catch(e) { console.warn("Firebase Init Error"); }
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('admin-main').style.display = 'block';
                document.getElementById('admin-email').innerText = `Logged in as: ${user.email}`;
                fetchLicenseStats();
            } else {
                Swal.fire("Access Denied", "Log in to the Dashboard first.", "error").then(() => {
                    window.location.href = "dashboard.html";
                });
            }
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            if(tabName === 'stats') fetchLicenseStats();
        }

        // 📊 FETCH STATS & POPULATE TABLE
        async function fetchLicenseStats() {
            try {
                const snapshot = await db.collection("appsumo_codes").get();
                let total = 0, usedCount = 0;
                let usedItems =[];

                snapshot.forEach(doc => {
                    total++;
                    const data = doc.data();
                    if(data.used) {
                        usedCount++;
                        usedItems.push({ code: doc.id, ...data });
                    }
                });

                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-used').innerText = usedCount;
                document.getElementById('stat-avail').innerText = total - usedCount;

                usedItems.sort((a, b) => (b.usedAt?.toDate() || 0) - (a.usedAt?.toDate() || 0));

                let usedListHTML = '';
                if (usedItems.length === 0) {
                    usedListHTML = '<tr><td colspan="4" style="text-align: center; color: #64748b;">No codes have been redeemed yet.</td></tr>';
                } else {
                    usedItems.slice(0, 50).forEach(item => {
                        const dateStr = item.usedAt ? item.usedAt.toDate().toLocaleString() : "Unknown";
                        usedListHTML += `
                            <tr>
                                <td>${item.code}</td>
                                <td style="color: #fff; font-family: 'Poppins', sans-serif;">${item.usedBy}</td>
                                <td>${dateStr}</td>
                                <td>
                                    <!-- 🔥 NEW: Revoke Button -->
                                    <button class="btn-revoke" onclick="revokeAccess('${item.code}', '${item.usedBy}')">
                                        <i class="fas fa-ban"></i> Revoke Access
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }
                document.getElementById('used-codes-list').innerHTML = usedListHTML;

            } catch (error) {
                console.error(error);
                document.getElementById('used-codes-list').innerHTML = '<tr><td colspan="4" style="color: #ef4444; text-align:center;">Permission Denied. Did you update the Firebase Rules?</td></tr>';
            }
        }

        // 🔥 NEW: REVOKE ACCESS LOGIC
        window.revokeAccess = function(code, email) {
            Swal.fire({
                title: 'Revoke Pro Access?',
                text: `This will downgrade ${email} to FREE plan and permanently delete the code ${code}.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Yes, Revoke!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        // 1. Find User by Email and Downgrade to 'free'
                        const userQuery = await db.collection("users").where("email", "==", email).get();
                        const batch = db.batch();
                        
                        userQuery.forEach(userDoc => {
                            batch.update(userDoc.ref, { plan: "free" });
                        });

                        // 2. Delete the specific AppSumo Code from database
                        const codeRef = db.collection("appsumo_codes").doc(code);
                        batch.delete(codeRef);

                        // 3. Commit changes to Firebase
                        await batch.commit();

                        Swal.fire('Revoked!', 'User access has been downgraded to Free.', 'success');
                        fetchLicenseStats(); // Refresh table
                    } catch(error) {
                        console.error("Revoke Error:", error);
                        Swal.fire('Error', 'Failed to revoke access.', 'error');
                    }
                }
            });
        }

        // 🎟️ GENERATOR LOGIC
        function generateRandomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        async function generateCodes() {
            const prefix = document.getElementById('prefix').value.trim().toUpperCase();
            const amount = parseInt(document.getElementById('amount').value);
            const btn = document.getElementById('gen-btn');
            const statusDiv = document.getElementById('gen-status');

            if(!amount || amount < 1 || amount > 10000) return Swal.fire('Error', 'Enter amount between 1 - 10000', 'error');

            btn.disabled = true; btn.innerText = 'Generating...';
            statusDiv.style.display = 'block'; statusDiv.innerText = "Processing...";

            try {
                let generatedCodes =[]; let uniqueSet = new Set();
                while(generatedCodes.length < amount) {
                    const code = `${prefix}-${generateRandomString(4)}-${generateRandomString(4)}`;
                    if(!uniqueSet.has(code)) { uniqueSet.add(code); generatedCodes.push(code); }
                }

                const BATCH_SIZE = 500;
                for (let i = 0; i < generatedCodes.length; i += BATCH_SIZE) {
                    const chunk = generatedCodes.slice(i, i + BATCH_SIZE);
                    const batch = db.batch();
                    chunk.forEach(code => { batch.set(db.collection("appsumo_codes").doc(code), { used: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); });
                    statusDiv.innerText = `Saving to database (${Math.min(i + BATCH_SIZE, amount)}/${amount})...`;
                    await batch.commit(); 
                }

                const fileContent = generatedCodes.join('\n');
                const blob = new Blob([fileContent], { type: 'text/plain' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob); link.download = `AppSumo_${prefix}_${amount}.txt`; link.click();

                Swal.fire('Success', `${amount} codes saved & downloaded!`, 'success');
                statusDiv.innerText = `✅ Success!`; fetchLicenseStats(); 
            } catch(e) { Swal.fire('Error', 'Failed to save to database. Check Rules.', 'error'); } 
            finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-cogs"></i> Generate & Save to Firebase'; }
        }
    </script>
</body>
</html>
